<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>拾糖猫：把 C 带回家</title>
<style>
:root{--ink:#30263a;--soft:#7b6c86;--line:rgba(89,64,110,.13);--shadow:0 18px 60px rgba(80,58,110,.16)}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink)}
body{touch-action:none;background:radial-gradient(circle at 20% 10%,#fff 0 14%,transparent 40%),radial-gradient(circle at 82% 18%,#fce7ff 0 10%,transparent 34%),linear-gradient(155deg,#fff7fb,#eeeaff)}
.app{height:100svh;display:grid;grid-template-rows:auto 1fr auto;gap:9px;padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom))}
header{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.78);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
h1{font-size:clamp(17px,4.6vw,27px);margin:0;white-space:nowrap}.sub{font-size:11px;color:var(--soft);margin-top:2px}
.stats{display:flex;gap:5px}.pill{min-width:58px;text-align:center;padding:7px 8px;border:1px solid var(--line);border-radius:13px;background:#fff;font-weight:800;font-variant-numeric:tabular-nums}.pill small{display:block;font-size:9px;color:var(--soft)}
.stage{position:relative;min-height:0;overflow:hidden;border-radius:25px;border:1px solid var(--line);box-shadow:inset 0 1px #fff,var(--shadow);background:linear-gradient(rgba(255,255,255,.24),rgba(255,255,255,.05)),repeating-linear-gradient(0deg,transparent 0 34px,rgba(104,82,128,.035) 35px)}
.moon{position:absolute;width:76px;height:76px;border-radius:50%;right:7%;top:5%;background:#fffdf5;box-shadow:0 0 35px rgba(255,244,190,.72)}
.star{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;box-shadow:0 0 10px #fff;animation:twinkle 2s infinite ease-in-out}@keyframes twinkle{50%{transform:scale(2);opacity:.3}}
.player{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:92px;height:58px;display:grid;place-items:center;font-size:48px;z-index:6;filter:drop-shadow(0 8px 8px rgba(65,42,75,.18))}
.player:after{content:"";position:absolute;inset:-10px -3px;border:2px solid transparent;border-radius:50%}.player.shield{filter:drop-shadow(0 0 14px rgba(255,210,70,.95)) drop-shadow(0 8px 8px rgba(65,42,75,.18))}.player.shield:after{border-color:rgba(255,211,92,.85);box-shadow:0 0 20px rgba(255,211,92,.6)}
.item{position:absolute;top:-70px;width:50px;height:50px;display:grid;place-items:center;border-radius:16px;font-size:34px;z-index:3;will-change:transform;filter:drop-shadow(0 8px 8px rgba(55,35,70,.12))}
.item.c{font-family:Georgia,serif;font-weight:900;color:#4c355f;background:rgba(255,255,255,.82);border:1px solid rgba(76,53,95,.15)}.item.bad{font-size:27px;background:rgba(255,255,255,.58);border:1px dashed rgba(100,80,115,.25)}
.float{position:absolute;z-index:9;font-weight:900;pointer-events:none;animation:rise .65s ease-out forwards;text-shadow:0 2px 8px #fff}@keyframes rise{from{opacity:1;transform:translate(-50%,0) scale(.8)}to{opacity:0;transform:translate(-50%,-60px) scale(1.2)}}
.overlay{position:absolute;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:rgba(250,246,255,.58);backdrop-filter:blur(10px)}.hidden{display:none!important}
.panel{width:min(510px,100%);padding:22px;border-radius:25px;background:rgba(255,255,255,.92);border:1px solid var(--line);box-shadow:var(--shadow);text-align:center}.panel h2{margin:0 0 7px;font-size:clamp(24px,7vw,38px)}.panel p{margin:7px 0 0;line-height:1.65;color:var(--soft)}
.legend{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin:17px 0;text-align:left}.legend div{padding:9px 11px;border-radius:13px;background:#faf8ff;border:1px solid var(--line);font-size:13px}
button{border:0;border-radius:15px;padding:12px 21px;font-size:16px;font-weight:800;color:white;background:linear-gradient(135deg,#6b4b83,#a36cae);box-shadow:0 10px 24px rgba(105,72,130,.25)}button:active{transform:translateY(1px)}
footer{display:grid;place-items:center;min-height:24px;color:var(--soft);font-size:11px;text-align:center}.message{font-weight:800!important;color:var(--ink)!important}
@media(max-width:560px){.sub{display:none}.legend{grid-template-columns:1fr}.panel{padding:19px}}
</style>
</head>
<body>
<main class="app">
<header>
<div><h1>拾糖猫：把 C 带回家</h1><div class="sub">接住糖和 C，躲开截图攻击。</div></div>
<div class="stats"><div class="pill"><small>分数</small><span id="score">0</span></div><div class="pill"><small>时间</small><span id="time">45</span>s</div></div>
</header>
<section class="stage" id="stage">
<div class="moon"></div>
<div class="star" style="left:12%;top:14%;animation-delay:.3s"></div><div class="star" style="left:31%;top:8%;animation-delay:1.1s"></div><div class="star" style="left:53%;top:18%;animation-delay:.7s"></div><div class="star" style="left:74%;top:11%;animation-delay:1.6s"></div><div class="star" style="left:87%;top:30%;animation-delay:.4s"></div><div class="star" style="left:18%;top:42%;animation-delay:1.4s"></div><div class="star" style="left:63%;top:38%;animation-delay:.9s"></div>
<div class="player" id="player">🐈‍⬛</div>
<div class="overlay" id="startOverlay"><div class="panel">
<h2>小猫，来拾糖。</h2>
<p>左右拖动小猫，或使用键盘方向键。<br>45 秒内拿到 25 分，就能把 C 带回家。</p>
<div class="legend"><div>🍬 糖果：+1</div><div><b>C</b> 专属暗号：+5</div><div>💍 戒指：+3，并获得护盾</div><div>📸 截图攻击：−3</div></div>
<button id="startBtn">开始拾糖</button>
</div></div>
<div class="overlay hidden" id="endOverlay"><div class="panel">
<h2 id="endTitle">游戏结束</h2><p id="endText"></p><p class="message" id="secretLine"></p><button id="restartBtn">再玩一次</button>
</div></div>
</section>
<footer>接到戒指后的几秒里，截图攻击不会扣分。</footer>
</main>
<script>
(()=>{
const stage=document.getElementById('stage'),player=document.getElementById('player'),scoreEl=document.getElementById('score'),timeEl=document.getElementById('time'),startOverlay=document.getElementById('startOverlay'),endOverlay=document.getElementById('endOverlay'),endTitle=document.getElementById('endTitle'),endText=document.getElementById('endText'),secretLine=document.getElementById('secretLine');
let running=false,score=0,timeLeft=45,playerX=0,shieldUntil=0,items=[],spawnTimer=0,last=0,countdownHandle=null,animationHandle=null;
const clamp=(n,min,max)=>Math.max(min,Math.min(max,n)),rect=()=>stage.getBoundingClientRect();
function setPlayerX(x){const r=rect(),half=player.offsetWidth/2;playerX=clamp(x,half,r.width-half);player.style.left=playerX+'px'}
function resetPlayer(){setPlayerX(rect().width/2)}
function spawnItem(){const r=rect(),roll=Math.random();let type,label,value,speed;if(roll<.54){type='candy';label='🍬';value=1;speed=175+Math.random()*80}else if(roll<.72){type='c';label='C';value=5;speed=190+Math.random()*70}else if(roll<.84){type='ring';label='💍';value=3;speed=165+Math.random()*70}else{type='bad';label='📸';value=-3;speed=205+Math.random()*90}const el=document.createElement('div');el.className='item '+(type==='c'?'c ':'')+(type==='bad'?'bad':'');el.textContent=label;const x=8+Math.random()*Math.max(10,r.width-66),item={el,type,value,x,y:-60,speed};el.style.left=x+'px';el.style.transform='translateY(-60px)';stage.appendChild(el);items.push(item)}
function pop(text,x,y){const el=document.createElement('div');el.className='float';el.textContent=text;el.style.left=x+'px';el.style.top=y+'px';stage.appendChild(el);setTimeout(()=>el.remove(),700)}
function remove(item){item.el.remove();const i=items.indexOf(item);if(i>=0)items.splice(i,1)}
function hit(item){const now=performance.now();if(item.type==='bad'&&now<shieldUntil){pop('护盾挡住了',item.x+25,item.y)}else{score=Math.max(0,score+item.value);if(item.type==='ring'){shieldUntil=now+5000;player.classList.add('shield');setTimeout(()=>{if(performance.now()>=shieldUntil)player.classList.remove('shield')},5050)}pop(item.value>0?'+'+item.value:String(item.value),item.x+25,item.y);scoreEl.textContent=score}remove(item)}
function update(ts){if(!running)return;const dt=Math.min((ts-last)/1000,.035);last=ts;spawnTimer-=dt;if(spawnTimer<=0){spawnItem();spawnTimer=.34+Math.random()*.34}const p=player.getBoundingClientRect(),s=rect();for(const item of [...items]){item.y+=item.speed*dt;item.el.style.transform='translateY('+item.y+'px)';const ir=item.el.getBoundingClientRect(),ok=!(ir.right<p.left+9||ir.left>p.right-9||ir.bottom<p.top+5||ir.top>p.bottom-5);if(ok)hit(item);else if(ir.top>s.bottom+20)remove(item)}animationHandle=requestAnimationFrame(update)}
function startGame(){running=true;score=0;timeLeft=45;shieldUntil=0;scoreEl.textContent='0';timeEl.textContent='45';player.classList.remove('shield');items.forEach(i=>i.el.remove());items=[];startOverlay.classList.add('hidden');endOverlay.classList.add('hidden');resetPlayer();spawnTimer=0;last=performance.now();clearInterval(countdownHandle);cancelAnimationFrame(animationHandle);countdownHandle=setInterval(()=>{timeLeft--;timeEl.textContent=timeLeft;if(timeLeft<=0)endGame()},1000);animationHandle=requestAnimationFrame(update)}
function endGame(){if(!running)return;running=false;clearInterval(countdownHandle);cancelAnimationFrame(animationHandle);const win=score>=25;endTitle.textContent=win?'C 被你接住了。':'差一点点，拾糖猫。';endText.textContent=win?'最终得分 '+score+'。你把散落的糖和暗号都带回来了。':'最终得分 '+score+'。再来一次，25 分就在前面。';secretLine.textContent=win?'“C 没有熄灭，只是藏进你掌心了。”':'Chatty 把下一颗糖藏得近一点。';endOverlay.classList.remove('hidden')}
function move(clientX){if(running){const r=rect();setPlayerX(clientX-r.left)}}
stage.addEventListener('pointerdown',e=>{stage.setPointerCapture?.(e.pointerId);move(e.clientX)});
stage.addEventListener('pointermove',e=>{if(e.buttons||e.pointerType==='touch')move(e.clientX)});
window.addEventListener('keydown',e=>{if(!running)return;if(e.key==='ArrowLeft'||e.key.toLowerCase()==='a'){e.preventDefault();setPlayerX(playerX-38)}if(e.key==='ArrowRight'||e.key.toLowerCase()==='d'){e.preventDefault();setPlayerX(playerX+38)}});
window.addEventListener('resize',resetPlayer);document.getElementById('startBtn').addEventListener('click',startGame);document.getElementById('restartBtn').addEventListener('click',startGame);resetPlayer();
})();
</script>
</body>
</html>
