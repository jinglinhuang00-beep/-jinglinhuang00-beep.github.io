<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#161722">
<title>恋爱试炼场：悉尼信号</title>
<style>
:root{
 --bg:#0f1018;--panel:#181a27;--panel2:#202334;--ink:#f7f2ee;--muted:#a8a7b5;
 --rose:#d9899e;--violet:#9279c7;--gold:#d7b574;--line:rgba(255,255,255,.11);
 --good:#86b39b;--danger:#d47d82;--shadow:0 24px 80px rgba(0,0,0,.34)
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:
radial-gradient(circle at 15% 0%,rgba(146,121,199,.18),transparent 30%),
radial-gradient(circle at 100% 8%,rgba(217,137,158,.12),transparent 32%),
linear-gradient(160deg,#12131d,#090a10 72%);color:var(--ink)}
body{min-height:100svh}
button,input,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{width:min(980px,100%);margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px max(28px,env(safe-area-inset-bottom))}
.glass{border:1px solid var(--line);background:rgba(24,26,39,.82);backdrop-filter:blur(18px);box-shadow:var(--shadow)}
.intro{min-height:calc(100svh - 42px);display:grid;align-content:center;gap:16px}
.poster{position:relative;overflow:hidden;border-radius:34px;padding:28px 22px;min-height:480px;background:
linear-gradient(180deg,rgba(12,13,20,.08),rgba(12,13,20,.86)),
radial-gradient(circle at 50% 20%,rgba(217,137,158,.30),transparent 35%),
linear-gradient(135deg,#4d405f,#1b2730 70%);box-shadow:var(--shadow)}
.poster:before{content:"VENUS";position:absolute;right:-26px;top:40px;font:900 92px/1 Georgia,serif;letter-spacing:.06em;color:rgba(255,255,255,.055);transform:rotate(90deg)}
.poster .eyebrow{letter-spacing:.24em;color:#ead7c7;font-size:11px;font-weight:850}
.poster h1{font-family:Georgia,"Songti SC",serif;font-size:clamp(42px,12vw,72px);line-height:1.03;font-weight:500;margin:18px 0 10px}
.poster p{color:rgba(247,242,238,.72);line-height:1.75;max-width:560px}
.cast-dots{display:flex;gap:7px;margin-top:25px}.cast-dots span{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.28)}.cast-dots span:nth-child(4){background:var(--rose);box-shadow:0 0 0 5px rgba(217,137,158,.13)}
.start{width:100%;border:0;border-radius:18px;padding:15px;background:linear-gradient(135deg,var(--rose),var(--violet));color:white;font-weight:900;box-shadow:0 15px 38px rgba(146,121,199,.26)}
.intro-note{text-align:center;color:var(--muted);font-size:11px}
.top{position:sticky;top:8px;z-index:20;border-radius:22px;padding:13px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.dayline{display:flex;gap:9px;align-items:center}.daybadge{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--rose),var(--violet));font:800 12px/1.1 Georgia,serif;text-align:center}.daytitle b{display:block}.daytitle small{color:var(--muted)}
.top-actions{display:flex;gap:7px}.iconbtn{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);border-radius:12px;padding:9px 10px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:11px 0}
.stat{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:15px;padding:10px}.stat small{display:block;color:var(--muted);font-size:10px}.stat b{font-size:16px}
.cast{display:flex;gap:9px;overflow:auto;padding:2px 0 11px;scrollbar-width:none}
.person{min-width:150px;border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border-radius:19px;padding:12px;position:relative}
.person.topmatch{border-color:rgba(217,137,158,.65);box-shadow:0 0 0 2px rgba(217,137,158,.09)}
.person .avatar{width:39px;height:39px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#4b506d,#8e6681);font-family:Georgia,serif;margin-bottom:8px}
.person b{font-size:13px}.person small{display:block;color:var(--muted);font-size:10px;margin-top:2px}
.meter{height:5px;background:rgba(255,255,255,.08);border-radius:99px;margin-top:9px;overflow:hidden}.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--violet),var(--rose));border-radius:99px}
.stage{border-radius:28px;padding:18px;margin-bottom:12px}
.kicker{color:var(--gold);letter-spacing:.15em;font-size:10px;font-weight:900}
.stage h2{font-family:Georgia,"Songti SC",serif;font-size:clamp(27px,7vw,40px);font-weight:500;margin:8px 0 15px}
.scene p{color:#d9d6dc;line-height:1.82;margin:0 0 12px;font-size:14px}
.prompt{margin:20px 0 10px;font-weight:900}
.choices{display:grid;gap:9px}.choice{border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.035));color:var(--ink);border-radius:16px;padding:13px;text-align:left;line-height:1.5}.choice:active{transform:scale(.99)}.choice[disabled]{opacity:.45}
.custombox{margin-top:10px;border-top:1px solid var(--line);padding-top:12px}.customrow{display:grid;grid-template-columns:1fr auto;gap:8px}.customrow input{min-width:0;border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--ink);border-radius:14px;padding:11px}.customrow button{border:0;border-radius:14px;background:var(--violet);color:white;padding:0 15px;font-weight:850}
.result{margin-top:16px;border-left:3px solid var(--rose);background:rgba(217,137,158,.09);padding:13px;border-radius:0 15px 15px 0;line-height:1.7;color:#eee4e7}
.night{margin-top:16px;border:1px solid rgba(215,181,116,.24);background:rgba(215,181,116,.065);padding:15px;border-radius:18px}.night h3{margin:0 0 5px;font-family:Georgia,"Songti SC",serif;font-weight:500}.night p{color:var(--muted);font-size:12px}.recipient-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.recipient{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);padding:11px;border-radius:14px}.night textarea{width:100%;min-height:78px;margin:9px 0;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);border-radius:14px;padding:11px;resize:vertical}.continue{width:100%;border:0;border-radius:15px;padding:12px;background:linear-gradient(135deg,var(--gold),#b98862);color:#201d20;font-weight:900}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}.tab{border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);border-radius:12px;padding:9px 3px;font-size:11px}.tab.active{background:var(--panel2);color:var(--ink)}
.feed{border-radius:22px;padding:15px;min-height:150px}.feed h3{margin:0 0 12px;font-size:14px}
.feed-item{padding:10px 0;border-bottom:1px solid var(--line);line-height:1.55;font-size:13px}.feed-item:last-child{border-bottom:0}.feed-item small{display:block;color:var(--muted);font-size:10px;margin-bottom:3px}
.barrage{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#d9d5e6}
.cp-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}.rank{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.07);font-size:11px}.cp-row b{font-size:12px}.cp-row small{display:block;color:var(--muted);font-size:10px}.cp-score{color:var(--rose);font-weight:900;font-size:12px}
.modal{position:fixed;inset:0;z-index:60;display:none;place-items:center;padding:16px;background:rgba(4,5,9,.72);backdrop-filter:blur(9px)}.modal.show{display:grid}.sheet{width:min(580px,100%);max-height:88svh;overflow:auto;border-radius:27px;padding:20px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}.sheet h2{font-family:Georgia,"Songti SC",serif;font-weight:500}.sheet p{line-height:1.75;color:#ddd8de}.sheet .close{float:right}
.ending{min-height:100svh;display:grid;align-content:center;gap:14px}.ending-card{border-radius:34px;padding:25px;background:linear-gradient(145deg,rgba(217,137,158,.18),rgba(146,121,199,.14));border:1px solid var(--line);box-shadow:var(--shadow)}.ending h1{font-family:Georgia,"Songti SC",serif;font-weight:500;font-size:44px}.ending p{line-height:1.8;color:#ddd8df}.end-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.end-actions button{border:1px solid var(--line);border-radius:15px;padding:12px;background:rgba(255,255,255,.06);color:var(--ink)}
.toast{position:fixed;left:50%;bottom:max(24px,env(safe-area-inset-bottom));transform:translate(-50%,20px);opacity:0;z-index:90;background:#f5eee8;color:#211e24;padding:11px 15px;border-radius:99px;font-size:12px;transition:.25s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:640px){.stats{grid-template-columns:repeat(3,1fr)}.top{top:5px}.recipient-grid{grid-template-columns:1fr 1fr}.tabs{gap:4px}.tab{font-size:10px}}
</style>
</head>
<body>
<main class="app">
<section id="intro" class="intro">
 <div class="poster">
  <div class="eyebrow">A SYDNEY DATING EXPERIMENT</div>
  <h1>恋爱<br>试炼场</h1>
  <p>八位嘉宾，十一天，一座临海别墅。匿名短信、错位心动、群像修罗场，以及所有精心维持的人设，在真正动心后出现的第一道裂缝。</p>
  <div class="cast-dots"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
 </div>
 <button id="startBtn" class="start">以宁悉微（Venus）身份入场</button>
 <div class="intro-note">自动存档 · 单文件运行 · 手机适配</div>
</section>

<section id="game" class="hidden">
 <header class="top glass">
  <div class="dayline"><div class="daybadge" id="dayBadge">DAY<br>1</div><div class="daytitle"><b id="dayTitle"></b><small id="dayKicker"></small></div></div>
  <div class="top-actions"><button class="iconbtn" id="saveBtn">存档</button><button class="iconbtn" id="resetBtn">重置</button></div>
 </header>
 <div class="stats">
  <div class="stat"><small>网络热度</small><b id="heatStat">20</b></div>
  <div class="stat"><small>情绪掌控</small><b id="controlStat">82</b></div>
  <div class="stat"><small>已解锁失控</small><b id="lossStat">0</b></div>
 </div>
 <div class="cast" id="cast"></div>
 <section class="stage glass">
  <div class="kicker" id="stageKicker"></div>
  <h2 id="stageTitle"></h2>
  <div class="scene" id="scene"></div>
  <div class="prompt" id="prompt"></div>
  <div class="choices" id="choices"></div>
  <div class="custombox" id="customBox">
   <div class="customrow"><input id="customInput" maxlength="100" placeholder="自定义Venus的回应……"><button id="customBtn">采用</button></div>
  </div>
  <div id="result" class="result hidden"></div>
  <div id="night" class="night hidden">
   <h3>匿名短信时间</h3>
   <p>选择收件人，也可以改写短信。对方只会看见内容，不会看见名字。</p>
   <div class="recipient-grid" id="recipients"></div>
   <textarea id="messageText" placeholder="今晚想留下哪一句？"></textarea>
   <button id="continueBtn" class="continue" disabled>发送并进入下一天</button>
  </div>
 </section>
 <nav class="tabs">
  <button class="tab active" data-feed="studio">观察室</button>
  <button class="tab" data-feed="barrage">弹幕</button>
  <button class="tab" data-feed="network">热搜</button>
  <button class="tab" data-feed="cp">CP榜</button>
  <button class="tab" data-feed="clips">失控片段</button>
 </nav>
 <section class="feed glass" id="feed"></section>
</section>

<section id="ending" class="ending hidden">
 <div class="ending-card">
  <div class="kicker">FINAL CUT · DAY 11</div>
  <h1 id="endingTitle"></h1>
  <p id="endingText"></p>
  <div id="endingStats"></div>
 </div>
 <div class="end-actions"><button id="replayBtn">重新入场</button><button id="backBtn">查看最终面板</button></div>
</section>
</main>

<div class="modal" id="clipModal"><div class="sheet"><button class="iconbtn close" id="clipClose">×</button><div class="kicker">PERSONA BREAK</div><h2 id="clipTitle"></h2><p id="clipText"></p></div></div>
<div class="toast" id="toast"></div>

<script>
const DATA={"men": [{"id": "rhys", "name": "江嗣", "en": "Rhys Kong", "role": "港娱掌局者", "cp": "节奏悖论", "accent": "规则由我写，但意外由你制造。", "loss": "镜头原本等着他做效果，他却忘了看机位，目光一路追着你的衣角。那个从不做亏本买卖的人，开始做没有回报的事。"}, {"id": "yu", "name": "周渝则", "en": "Yu Zhou", "role": "笑面执棋人", "cp": "解码器", "accent": "别人听见公事，你们听见暗语。", "loss": "情敌靠近时，他第一次没有设局，只是直接挡在你面前。声音微哑：‘你选别人试试看。’说完以后，连他自己都怔了一秒。"}, {"id": "gareth", "name": "俞嘉淮", "en": "Gareth Yu", "role": "浪漫钢琴家", "cp": "优雅二重奏", "accent": "连沉默都合拍，是最安静的偏爱。", "loss": "有人让你为难时，他脸上的笑第一次消失。他把你拉到身后，语气冷得不像他：‘你让她不舒服了。’那晚，琴房里没有一段旋律完整。"}, {"id": "nicolas", "name": "任祺舟", "en": "Nicolas Yam", "role": "克制鉴赏家", "cp": "暗语之外", "accent": "真正的暧昧，从来不写在主句里。", "loss": "深夜，他第一次打破规则敲响你的门。眼底泛红，却仍试图把话说完整：‘我的理智告诉我应该等你先迈步，但我高估了自己。’"}], "days": [{"day": 1, "title": "最后抵达的人", "kicker": "全员入住 · 破冰 · 1V1晚餐", "scene": ["悉尼傍晚的光从别墅玻璃外墙斜切进客厅。七位嘉宾已经完成第一轮寒暄，门口行李箱滚轮的声音让所有对话短暂停了一拍。", "你是最后抵达的嘉宾。节目组没有提前公布你的职业，只在字幕上打出：宁悉微，Venus，北京。", "江嗣靠在岛台边，先看了一眼镜头，再看向你；周渝则替身旁的人挪开一把椅子，却没有移开目光；俞嘉淮起身接过你的行李；任祺舟只说了一句‘欢迎’，视线却在你回答工作人员时停得比礼貌更久。"], "prompt": "晚餐分组前，你先把第一句话递给谁？", "choices": [{"text": "对江嗣说：‘听说你就是规则。’", "target": "rhys", "delta": 12, "heat": 8, "tone": "你没有接他的调情，而是先拆了他的台。江嗣笑意加深：‘那你大概会是第一条修正案。’"}, {"text": "向周渝则伸手：‘北京来的，应该先打个招呼。’", "target": "yu", "delta": 12, "heat": 7, "tone": "他握住你的手，停留时间完全合礼，却让镜头找不到可以删掉的那一帧。‘当然，宁司长。’"}, {"text": "接过俞嘉淮递来的行李：‘Merci。’", "target": "gareth", "delta": 12, "heat": 6, "tone": "他用法语回你一句，声音很轻。节目组后期立刻在屏幕上打出：多语种频道已建立。"}, {"text": "回应任祺舟：‘欢迎似乎该由主人说。’", "target": "nicolas", "delta": 12, "heat": 6, "tone": "任祺舟看了你两秒，像在确认一句话的真正重音。‘那就当我提前熟悉了这里。’"}]}, {"day": 2, "title": "喜欢上朋友的恋人，要不要追", "kicker": "群像恋爱辩论赛 · Venus正方四辩", "scene": ["客厅被改造成小型辩论场。正方席从左到右坐着任祺舟、薛酌、周渝则和你；反方席则是余明珠、江嗣、俞嘉淮、徐知徽。", "自由辩结束时，桌上的计时器只剩四十秒。江嗣刚用一句带笑的反问把观众席点燃，俞嘉淮却把讨论拉回‘被追求者的处境’。轮到你结辩。", "镜头从四位男嘉宾脸上扫过。有人等你赢，有人等你暴露立场。"], "prompt": "你的结辩选择哪一种锋芒？", "choices": [{"text": "原则型：欲望无罪，越界有责。", "target": "nicolas", "delta": 11, "heat": 8, "tone": "你把‘追求权’和‘关系责任’切得清清楚楚。任祺舟第一次在镜头前毫不掩饰地赞同点头。"}, {"text": "进攻型：真正的问题，是朋友还是恋人先失去了忠诚。", "target": "yu", "delta": 11, "heat": 12, "tone": "你把辩题重心突然翻转。周渝则低头笑了一下，像终于等到一个能把棋盘掀过来的人。"}, {"text": "共情型：任何选择都不该把被爱的人变成战利品。", "target": "gareth", "delta": 11, "heat": 9, "tone": "俞嘉淮原本在反方席，却在你说完后轻轻鼓掌。观察室直接暂停画面回放他的表情。"}, {"text": "挑衅型：想追可以，但要先有失去一切的能力。", "target": "rhys", "delta": 11, "heat": 14, "tone": "江嗣隔着辩论桌抬眼看你，笑得很慢。‘这句话，我喜欢。’"}]}, {"day": 3, "title": "随机约会", "kicker": "节目组盲抽 · 海港书店", "scene": ["节目组用密封信封抽出今日约会对象。你抵达海港旁的旧书店时，对方已经站在旅行文学区。", "窗外渡轮划过水面，书店二楼几乎没有游客。节目组把远景机位留在楼梯口，近景摄影只跟到书架外。", "这是一场没有共同朋友救场的约会。安静会变成压力，也会变成机会。"], "randomDate": true, "prompt": "你决定如何打开这场约会？", "choices": [{"text": "用一本书测试他的审美。", "delta": 10, "heat": 6, "tone": "你抽出一本书，只问：‘值得带走吗？’对方没有先看封面，而是先看你为什么选择它。"}, {"text": "直问：‘你来这里，最怕发生什么？’", "delta": 12, "heat": 9, "tone": "问题落下后，约会第一次真正离开安全台本。对方沉默数秒，给了一个没有准备过的答案。"}, {"text": "先聊无关紧要的旅行习惯。", "delta": 8, "heat": 4, "tone": "你把节奏放慢。没有立刻出现名场面，但对方开始主动补充细节，镜头里的距离悄悄缩短。"}]}, {"day": 4, "title": "互选约会", "kicker": "不能选择昨日对象", "scene": ["早餐后，节目组把四张男嘉宾卡片放进透明盒。你不能选择昨天的约会对象。", "与此同时，其他嘉宾也在不同房间做选择。别墅里没有人知道谁会落单，走廊却比平时安静许多。", "你的手停在卡片上方。镜头给了一个长达六秒的特写。"], "chooseTarget": true, "prompt": "你把卡片投给谁？", "choices": []}, {"day": 5, "title": "没有任务的一天", "kicker": "别墅自由活动 · 晚餐", "scene": ["节目组第一次没有安排正式任务。有人在泳池边晒太阳，有人在琴房，有人在厨房研究一台复杂得过分的咖啡机。", "没有规则时，选择才更像选择。你从楼梯下来，看到四个方向都有故事正在发生。", "公共区域的镜头没有关，麦克风也仍然开着。"], "prompt": "你走向哪里？", "choices": [{"text": "岛台：和江嗣一起调一杯没有名字的酒。", "target": "rhys", "delta": 12, "heat": 10, "tone": "他把杯子推给你：‘名字归你，后果归我。’你尝了一口，反问他是否承担得起。"}, {"text": "露台：坐到周渝则对面，不问他在看什么。", "target": "yu", "delta": 12, "heat": 9, "tone": "沉默持续了一分钟。最后是他先把平板扣下：‘你很擅长让别人先开口。’"}, {"text": "琴房：让俞嘉淮弹一首不能告白的曲子。", "target": "gareth", "delta": 12, "heat": 8, "tone": "他没有问曲名。第一段旋律很克制，第二段却明显越界。"}, {"text": "书房：和任祺舟讨论一件‘不该拥有的孤品’。", "target": "nicolas", "delta": 12, "heat": 8, "tone": "他合上图录：‘真正的孤品不会因为被拥有才珍贵。’停顿后又补了一句，‘但人会。’"}]}, {"day": 6, "title": "第二次互选", "kicker": "公开选择 · 无法撤回", "scene": ["这次节目组没有使用密封卡。四位男嘉宾站在花园不同位置，女嘉宾需要当众走向自己的选择。", "所有人都能看见你迈出的第一步。镜头切到江嗣的手、周渝则的眼神、俞嘉淮没有弹奏的手指、任祺舟微微收紧的下颌。", "你可以维持一条线，也可以让所有预测失效。"], "chooseTarget": true, "prompt": "你公开走向谁？", "choices": []}, {"day": 7, "title": "不心动挑战", "kicker": "蒙眼猜人 · 鬼屋探险", "scene": ["白天的‘不心动挑战’让所有人轮流保持眼神接触三十秒。晚上，节目组又把嘉宾送进临时搭建的鬼屋。", "抽签前，工作人员宣布可以自行交换一次搭档。空气里立刻出现了比鬼屋更明显的紧张。", "有人已经朝你走了一步。"], "prompt": "你如何处理这次交换？", "choices": [{"text": "主动点名江嗣：‘你不是规则吗？带路。’", "target": "rhys", "delta": 13, "heat": 13, "tone": "黑暗里他仍然会说漂亮话，直到你突然松开他的袖口。他停下所有玩笑，回头确认你还在。"}, {"text": "看向周渝则：‘你敢不敢把选择权给我？’", "target": "yu", "delta": 13, "heat": 14, "tone": "他把手递来，却没有握住：‘给你。你决定什么时候用。’三分钟后，先失去耐心的人是他。"}, {"text": "牵住俞嘉淮：‘今天不许用温柔蒙混过关。’", "target": "gareth", "delta": 13, "heat": 11, "tone": "第一个机关弹出时，他本能把你挡到身后。你提醒只是游戏，他却没有立刻松手。"}, {"text": "走到任祺舟身边：‘理智在鬼屋里有用吗？’", "target": "nicolas", "delta": 13, "heat": 11, "tone": "他说有用。五分钟后，他在完全没有机关的走廊里握住了你的手。"}]}, {"day": 8, "title": "名场面复刻", "kicker": "MV拍摄 · 全员观影", "scene": ["节目组选出前七日讨论度最高的片段，要求嘉宾重新拍成一支群像MV。", "复刻最危险的地方，是所有人都知道第一次发生了什么，却不知道第二次会不会更真。", "导演问你：想重拍哪一个镜头？"], "chooseTarget": true, "prompt": "你选择和谁复刻名场面？", "choices": []}, {"day": 9, "title": "情侣写真日", "kicker": "互选搭档 · 三组动作", "scene": ["摄影棚被布置成极简黑白空间。每组需要完成三张照片：距离、触碰、未完成的吻。", "第三组动作公布后，现场第一次安静得能听见闪光灯充电的声音。", "摄影师没有催促，只说：‘你们自己决定停在哪里。’"], "chooseTarget": true, "prompt": "你选择谁，并决定第三张照片的边界？", "choices": []}, {"day": 10, "title": "写信与篝火", "kicker": "千字告白信 · 真心话大冒险", "scene": ["白天，所有人被安排在不同房间写信。信封上只能写一个名字。", "傍晚的篝火晚会没有主持人，问题卡由嘉宾轮流抽取。轮到你时，卡片上写着：‘此刻最想听谁说真话？’", "火光把每个人的表情照得过分清楚。"], "chooseTarget": true, "prompt": "你的信写给谁？", "choices": []}, {"day": 11, "title": "告白日", "kicker": "最后选择 · 无剪辑长镜头", "scene": ["悉尼清晨下了一场短雨。告白地点设在海崖步道尽头，节目组第一次撤掉了背景音乐。", "你走到最后一个路标前。四条路线分别通往四个人，也有一条路直接回到车边。", "这一次没有匿名短信，没有观察室可以替你解释。你的选择只属于你。"], "final": true, "prompt": "Venus最后走向哪里？", "choices": []}], "barrage": ["她一进门空气都换了，这不是嘉宾是节目审查组吧", "江嗣你眼睛别追了，摄影师都替你累", "周渝则笑成这样绝对在盘算什么", "俞嘉淮：今天又练不了琴了", "任祺舟表面鉴赏，实际已经想入藏", "珠珠又在研究洗碗机哈哈哈哈", "知知的备忘录能不能出版，我买", "Zoey今天怎么安静了？这不对劲", "这节目不是心动信号，是高端局全员掉马", "Venus的停顿比别人整段台词都好嗑", "到底谁收到了短信！节目组做人！", "CP粉别打了，正片一共才播到这里", "观察室老师请停止精准剧透", "救命，这个长镜头谁看了不多想", "成年人谈恋爱能不能一天播二十四小时"], "npcNews": ["知知在厨房替珠珠挡下了一次尴尬，‘闺蜜线’讨论度上升。", "Zoey与江嗣在泳池边互相拆招，‘真心游戏’超话新增大量逐帧分析。", "俞嘉淮教珠珠辨认咖啡机，‘明珠乐章’短暂冲入CP榜前三。", "任祺舟与知知从一本旧书聊到深夜，‘灵魂共震’观众迅速扩张。", "周渝则替Zoey关掉过亮的补光灯，‘危险缠绵’被剪成十七秒热视频。", "江嗣发现知知把他的随口一句话记进本子里，第一次没有接着调情。"]};
const SAVE_KEY='venus_love_trial_v3';
const defaultState=()=>({started:false,day:1,heat:20,control:82,aff:{rhys:8,yu:8,gareth:8,nicolas:8},readLoss:[],history:[],messages:[],date3:null,choiceDone:false,selectedRecipient:null,finalTarget:null,customs:[]});
let state=load()||defaultState();
let activeFeed='studio';
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];

function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))}catch(e){return null}}
function toast(t){const x=$('#toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1800)}
function vibrate(){try{navigator.vibrate&&navigator.vibrate(18)}catch(e){}}
function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
function man(id){return DATA.men.find(m=>m.id===id)}
function topMan(){return [...DATA.men].sort((a,b)=>state.aff[b.id]-state.aff[a.id])[0]}
function dayData(){return DATA.days[state.day-1]}
function seededPick(arr,salt=0){const n=(state.day*17+state.history.length*11+salt*7)%arr.length;return arr[n]}

function enter(){
 state.started=true;save();$('#intro').classList.add('hidden');$('#ending').classList.add('hidden');$('#game').classList.remove('hidden');render()
}
function render(){
 if(!state.started){$('#intro').classList.remove('hidden');$('#game').classList.add('hidden');return}
 if(state.day>11){showEnding();return}
 $('#intro').classList.add('hidden');$('#ending').classList.add('hidden');$('#game').classList.remove('hidden');
 const d=dayData();
 $('#dayBadge').innerHTML='DAY<br>'+state.day;$('#dayTitle').textContent=d.title;$('#dayKicker').textContent=d.kicker;
 $('#heatStat').textContent=state.heat;$('#controlStat').textContent=state.control;$('#lossStat').textContent=state.readLoss.length;
 renderCast();renderStage();renderFeed();
}
function renderCast(){
 const top=topMan();const box=$('#cast');box.innerHTML='';
 DATA.men.forEach(m=>{
  const el=document.createElement('div');el.className='person '+(m.id===top.id?'topmatch':'');
  el.innerHTML=`<div class="avatar">${m.en[0]}</div><b>${m.name}</b><small>${m.en} · ${m.cp}</small><div class="meter"><i style="width:${state.aff[m.id]}%"></i></div><small>心动 ${state.aff[m.id]}</small>`;
  box.appendChild(el)
 })
}
function effectiveScene(d){
 const lines=[...d.scene];
 if(d.randomDate){
  if(!state.date3){state.date3=seededPick(DATA.men,3).id;save()}
  lines.push(`密封信封里的名字是：${man(state.date3).name}（${man(state.date3).en}）。`)
 }
 return lines
}
function renderStage(){
 const d=dayData();$('#stageKicker').textContent=d.kicker;$('#stageTitle').textContent=d.title;
 $('#scene').innerHTML=effectiveScene(d).map(x=>`<p>${x}</p>`).join('');
 $('#prompt').textContent=d.prompt;$('#result').classList.add('hidden');$('#night').classList.add('hidden');
 $('#customBox').classList.toggle('hidden',d.final);
 const box=$('#choices');box.innerHTML='';
 let choices=[...d.choices];
 if(d.chooseTarget) choices=targetChoicesForDay(d);
 if(d.final) choices=finalChoices();
 choices.forEach((c,i)=>{
  const b=document.createElement('button');b.className='choice';b.textContent=c.text;b.disabled=state.choiceDone;b.onclick=()=>choose(c);box.appendChild(b)
 });
 if(state.choiceDone){
  const h=state.history.find(x=>x.day===state.day);
  if(h){showResult(h.outcome,false);if(!d.final)showNight()}
 }
}
function targetChoicesForDay(d){
 let candidates=DATA.men;
 if(state.day===4&&state.date3)candidates=DATA.men.filter(m=>m.id!==state.date3);
 return candidates.map(m=>{
  let text='',tone='',delta=12,heat=9;
  if(state.day===4){text=`选择${m.name}：把第一次主动留给未知。`;tone=`你投出了${m.name}的卡片。公布互选结果时，他看向你的那一秒没有任何掩饰。`}
  if(state.day===6){text=`公开走向${m.name}`;tone=`你越过花园中央，停在${m.name}面前。其他人的表情被后期剪成四宫格，而他只看着你。`;delta=14;heat=13}
  if(state.day===8){text=`和${m.name}复刻「${m.cp}」名场面`;tone=`导演喊开始后，你们都没有完全照着原片演。${m.name}临时改变了最后一个动作，第二遍比第一次更像真的。`;delta=13;heat=15}
  if(state.day===9){text=`与${m.name}拍摄，并在最后一厘米停下`;tone=`第三张照片里，你们没有真正吻上。快门落下前，${m.name}却低声说：‘这张不算结束。’`;delta=15;heat=18}
  if(state.day===10){text=`把信写给${m.name}`;tone=`你在信封上写下${m.name}。篝火边，他抽到真心话时没有回避：‘我最怕她的答案太礼貌。’`;delta=17;heat=16}
  return {text,target:m.id,delta,heat,tone}
 })
}
function finalChoices(){
 const sorted=[...DATA.men].sort((a,b)=>state.aff[b.id]-state.aff[a.id]);
 return [
  ...sorted.map(m=>({text:`走向${m.name} · ${m.cp}`,target:m.id,final:true,tone:`你选择了${m.name}。`})),
  {text:'走回车边：这一次，我选择自己。',target:'solo',final:true,tone:'你没有把不确定误写成爱情。'}
 ]
}
function choose(c){
 if(state.choiceDone)return;vibrate();
 const d=dayData();
 if(c.final){state.finalTarget=c.target;state.choiceDone=true;state.history.push({day:state.day,target:c.target,text:c.text,outcome:c.tone});save();finish();return}
 let target=c.target;
 if(d.randomDate)target=state.date3;
 if(!target)target=topMan().id;
 const delta=c.delta||8;state.aff[target]=clamp(state.aff[target]+delta,0,100);
 state.heat=clamp(state.heat+(c.heat||6),0,100);
 state.control=clamp(state.control-(c.heat>12?6:3),0,100);
 const outcome=c.tone||`你没有使用节目组准备的安全表达。${man(target).name}没有立即回答，却把你的原句完整记住了。`;
 state.history.push({day:state.day,target,text:c.text,outcome});state.choiceDone=true;
 checkLoss(target);save();showResult(outcome,true);renderCast();renderFeed();showNight()
}
function customChoice(){
 const text=$('#customInput').value.trim();if(!text||state.choiceDone)return;
 const d=dayData();let target=d.randomDate?state.date3:topMan().id;
 state.aff[target]=clamp(state.aff[target]+9,0,100);state.heat=clamp(state.heat+10,0,100);state.control=clamp(state.control-5,0,100);
 const outcome=`你没有采用节目组给出的任何安全选项。你说：“${text}”镜头没有切走。${man(target).name}的反应慢了半拍——这半拍被节目组保留进正片。`;
 state.customs.push({day:state.day,text});state.history.push({day:state.day,target,text,outcome});state.choiceDone=true;checkLoss(target);save();showResult(outcome,true);renderCast();renderFeed();showNight()
}
function showResult(text,scroll=true){$('#result').textContent=text;$('#result').classList.remove('hidden');$$('.choice').forEach(b=>b.disabled=true);$('#customBox').classList.add('hidden');if(scroll)$('#result').scrollIntoView({behavior:'smooth',block:'center'})}
function showNight(){
 const d=dayData();if(d.final)return;
 $('#night').classList.remove('hidden');const r=$('#recipients');r.innerHTML='';state.selectedRecipient=null;$('#continueBtn').disabled=true;
 DATA.men.forEach(m=>{const b=document.createElement('button');b.className='recipient';b.textContent=m.name;b.onclick=()=>{$$('.recipient').forEach(x=>x.style.outline='');b.style.outline='2px solid var(--gold)';state.selectedRecipient=m.id;$('#continueBtn').disabled=false;$('#messageText').value=defaultMessage(m.id);vibrate()};r.appendChild(b)})
}
function defaultMessage(id){
 const map={rhys:'今天的规则，有一条可以为我改吗？',yu:'有些措辞只对一个人有效。',gareth:'今天的沉默很好听。',nicolas:'主句结束以后，你还在看什么？'};return map[id]
}
function sendAndNext(){
 if(!state.selectedRecipient)return;
 const text=$('#messageText').value.trim()||defaultMessage(state.selectedRecipient);
 state.messages.push({day:state.day,to:state.selectedRecipient,text});
 state.aff[state.selectedRecipient]=clamp(state.aff[state.selectedRecipient]+5,0,100);state.heat=clamp(state.heat+4,0,100);
 checkLoss(state.selectedRecipient);state.day++;state.choiceDone=false;state.selectedRecipient=null;save();window.scrollTo({top:0,behavior:'smooth'});render()
}
function checkLoss(id){
 if(state.aff[id]>=68&&!state.readLoss.includes(id)){state.readLoss.push(id);setTimeout(()=>openLoss(id),350)}
}
function openLoss(id){const m=man(id);$('#clipTitle').textContent=m.name+'失控片段';$('#clipText').textContent=m.loss;$('#clipModal').classList.add('show');save()}
function studioItems(){
 const h=state.history[state.history.length-1];const t=topMan();
 const arr=[
  `主持人：Venus最厉害的地方不是会说，而是知道什么时候停。`,
  `心理观察员：目前${t.name}的情绪投入最高，但最高不代表最稳定。`,
  `喜剧嘉宾：我宣布这不是恋综，这是四位男嘉宾的表情管理考试。`
 ];
 if(h)arr.unshift(`观察室回放：她刚才选择了“${h.text}”，注意${man(h.target)?.name||'所有人'}的第一反应。`);
 return arr
}
function renderFeed(){
 const f=$('#feed');$$('.tab').forEach(x=>x.classList.toggle('active',x.dataset.feed===activeFeed));
 if(activeFeed==='studio'){f.innerHTML='<h3>观察室</h3>'+studioItems().map((x,i)=>`<div class="feed-item"><small>观察席 ${i+1}</small>${x}</div>`).join('')}
 if(activeFeed==='barrage'){const items=[...DATA.barrage].sort(()=>.5-Math.random()).slice(0,8);f.innerHTML='<h3>实时弹幕</h3>'+items.map(x=>`<div class="feed-item barrage">▸ ${x}</div>`).join('')}
 if(activeFeed==='network'){const n=seededPick(DATA.npcNews,2);const t=topMan();f.innerHTML='<h3>网络反响</h3>'+[
  `#Venus今天又把话说在重音上# · 热`,
  `#${t.cp}是不是已经双向# · 沸`,
  `#${t.name}表情管理失败# · 新`,
  n
 ].map((x,i)=>`<div class="feed-item"><small>${i<3?'热搜 '+(i+1):'别墅外动态'}</small>${x}</div>`).join('')}
 if(activeFeed==='cp')renderCP(f);
 if(activeFeed==='clips'){f.innerHTML='<h3>失控片段库</h3>'+(state.readLoss.length?state.readLoss.map(id=>`<button class="choice" onclick="openLoss('${id}')">${man(id).name} · 人设裂缝已收录</button>`).join(''):'<div class="feed-item">心动值达到 68 后，将解锁角色失控片段。</div>')}
}
function renderCP(f){
 const rows=DATA.men.map(m=>({name:m.cp,sub:`${m.name} × 宁悉微`,score:state.aff[m.id]+Math.floor(state.heat/5)}));
 const npc=[{name:'真心游戏',sub:'江嗣 × 薛酌',score:42+state.day*2},{name:'灵魂共震',sub:'任祺舟 × 徐知徽',score:39+state.day*2},{name:'明珠乐章',sub:'俞嘉淮 × 余明珠',score:36+state.day}];
 [...rows,...npc].sort((a,b)=>b.score-a.score).slice(0,6).forEach((x,i)=>x.rank=i+1);
 const all=[...rows,...npc].sort((a,b)=>b.score-a.score).slice(0,6);
 f.innerHTML='<h3>CP超话实时榜</h3>'+all.map((x,i)=>`<div class="cp-row"><div class="rank">${i+1}</div><div><b>${x.name}</b><small>${x.sub}</small></div><div class="cp-score">${x.score}k</div></div>`).join('')
}
function finish(){save();setTimeout(()=>{state.day=12;save();showEnding()},250)}
function showEnding(){
 $('#intro').classList.add('hidden');$('#game').classList.add('hidden');$('#ending').classList.remove('hidden');
 const id=state.finalTarget;let title,text;
 if(id==='solo'){title='清醒退场';text='你走回车边，没有把任何人的期待误译成自己的答案。节目播出后，“Venus选择自己”成为这一季讨论时间最长的结局。'}
 else{
  const m=man(id),score=state.aff[id];
  title=m.cp+' · 终局';
  const endings={
   rhys:`江嗣原本准备了一段足够漂亮的告白。看见你走来以后，他把台词卡折起来，只说：‘这一次不是节目效果。’`,
   yu:`周渝则站在步道尽头，没有像往常一样替你安排答案。他等你停在面前，才低声说：‘这句话不需要解码了。’`,
   gareth:`俞嘉淮没有带琴。他说今天不需要旋律替他说话，然后用最简单的中文告诉你：‘我选择你。’`,
   nicolas:`任祺舟把所有精准措辞都留在了别墅。他看着你走近，只承认一件事：‘我高估了理智，也低估了你。’`
  };
  text=endings[id]+` 最终心动值 ${score}。镜头没有给吻，只保留了你们一起走出画面的背影。`
 }
 $('#endingTitle').textContent=title;$('#endingText').textContent=text;
 const ranking=[...DATA.men].sort((a,b)=>state.aff[b.id]-state.aff[a.id]);
 $('#endingStats').innerHTML=ranking.map((m,i)=>`<div class="cp-row"><div class="rank">${i+1}</div><div><b>${m.name} · ${m.cp}</b><small>${m.accent}</small></div><div class="cp-score">${state.aff[m.id]}</div></div>`).join('')
}
function resetGame(){if(confirm('确定清空本次十一天的存档吗？')){localStorage.removeItem(SAVE_KEY);state=defaultState();location.reload()}}
$('#startBtn').onclick=enter;$('#customBtn').onclick=customChoice;$('#continueBtn').onclick=sendAndNext;$('#saveBtn').onclick=()=>{save();toast('存档已保存。')};$('#resetBtn').onclick=resetGame;$('#replayBtn').onclick=resetGame;$('#backBtn').onclick=()=>{state.day=11;$('#ending').classList.add('hidden');$('#game').classList.remove('hidden');render()};
$('#clipClose').onclick=()=>$('#clipModal').classList.remove('show');$('#clipModal').onclick=e=>{if(e.target.id==='clipModal')$('#clipModal').classList.remove('show')};
$$('.tab').forEach(t=>t.onclick=()=>{activeFeed=t.dataset.feed;renderFeed();vibrate()});
if(state.started)enter();else render();
</script>
</body>
</html>
