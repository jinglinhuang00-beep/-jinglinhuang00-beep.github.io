<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Zizy 信箱</title>
<style>
:root {
  --paper:#fffaf1; --paper2:#f8f0e3; --ink:#332b39; --muted:#877b87;
  --wine:#6f3652; --rose:#b7788c; --gold:#b69258; --line:rgba(81,57,72,.16);
  --shadow:0 20px 60px rgba(74,44,62,.18);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:
radial-gradient(circle at 15% 8%,rgba(255,255,255,.95) 0 12%,transparent 34%),
radial-gradient(circle at 90% 5%,rgba(226,196,205,.32) 0 10%,transparent 31%),
linear-gradient(155deg,#f9f2e8,#eee1df)}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;background-image:
linear-gradient(rgba(85,62,70,.08) 1px,transparent 1px),
linear-gradient(90deg,rgba(85,62,70,.06) 1px,transparent 1px);background-size:28px 28px}
button,input,textarea{font:inherit}
.app{max-width:980px;margin:0 auto;min-height:100svh;padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom))}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 17px;border:1px solid var(--line);border-radius:24px;background:rgba(255,250,241,.8);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
.brand h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:clamp(27px,7vw,44px);font-weight:500;letter-spacing:.04em}
.brand p{margin:4px 0 0;color:var(--muted);font-size:12px;letter-spacing:.08em}
.signal{display:flex;align-items:center;gap:8px;color:var(--wine);font-weight:800;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;background:var(--rose);box-shadow:0 0 0 5px rgba(183,120,140,.14);animation:pulse 2s infinite}
@keyframes pulse{50%{transform:scale(.72);opacity:.55}}
.hero{position:relative;margin:14px 0;padding:20px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(135deg,rgba(255,250,241,.95),rgba(244,228,222,.9));box-shadow:var(--shadow);overflow:hidden}
.hero:after{content:"✦";position:absolute;right:20px;top:10px;font-size:72px;color:rgba(111,54,82,.08)}
.hero-kicker{color:var(--wine);font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}
.hero h2{font-family:Georgia,"Times New Roman",serif;font-size:clamp(24px,6.2vw,38px);font-weight:500;margin:8px 0 6px;line-height:1.2}
.hero p{margin:0;color:var(--muted);line-height:1.65;font-size:14px;max-width:620px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.tab{border:1px solid var(--line);border-radius:15px;padding:11px 8px;background:rgba(255,250,241,.72);color:var(--muted);font-weight:850}
.tab.active{background:var(--wine);color:white;border-color:transparent;box-shadow:0 10px 22px rgba(111,54,82,.22)}
.panel{display:none} .panel.active{display:block}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.envelope{position:relative;min-height:170px;border:1px solid var(--line);border-radius:22px;padding:16px;background:linear-gradient(145deg,var(--paper),var(--paper2));box-shadow:0 12px 28px rgba(73,47,60,.1);text-align:left;overflow:hidden;transition:.18s}
.envelope:active{transform:scale(.985)}
.envelope:before{content:"";position:absolute;left:-12%;right:-12%;bottom:-52px;height:100px;transform:rotate(-7deg);background:rgba(183,120,140,.08);border-top:1px solid rgba(111,54,82,.09)}
.day{font-size:10px;color:var(--muted);letter-spacing:.14em;font-weight:900}
.envelope h3{position:relative;margin:12px 0 6px;font-family:Georgia,"Times New Roman",serif;font-size:21px;font-weight:500}
.envelope p{position:relative;margin:0;color:var(--muted);font-size:12px}
.seal{position:absolute;right:14px;bottom:14px;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--wine);color:#f7e6d2;font-family:Georgia,serif;font-size:12px;border:3px double rgba(255,255,255,.7);box-shadow:0 6px 15px rgba(111,54,82,.25)}
.compose,.archive{border:1px solid var(--line);border-radius:24px;padding:17px;background:rgba(255,250,241,.86);box-shadow:var(--shadow)}
label{display:block;font-size:12px;font-weight:900;color:var(--wine);margin:0 0 6px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fffdf8;color:var(--ink);padding:12px;outline:none}
textarea{min-height:190px;resize:vertical;line-height:1.65}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px}
.primary{border:0;border-radius:15px;background:linear-gradient(135deg,var(--wine),#9a5a72);color:#fff;padding:12px 18px;font-weight:900;box-shadow:0 10px 24px rgba(111,54,82,.24)}
.ghost{border:1px solid var(--line);border-radius:15px;background:#fffaf1;color:var(--wine);padding:11px 15px;font-weight:850}
.hint{color:var(--muted);font-size:11px}
.saved-list{display:grid;gap:9px;margin-top:12px}
.saved{padding:13px;border:1px solid var(--line);border-radius:16px;background:#fffdf8}
.saved strong{display:block;margin-bottom:4px} .saved small{color:var(--muted)} .saved p{white-space:pre-wrap;margin:8px 0 0;line-height:1.55;font-size:13px}
.empty{text-align:center;color:var(--muted);padding:28px}
.modal{position:fixed;inset:0;z-index:30;display:none;place-items:center;padding:18px;background:rgba(37,25,34,.52);backdrop-filter:blur(9px)}
.modal.show{display:grid}
.letter{position:relative;width:min(620px,100%);max-height:86svh;overflow:auto;padding:28px 22px 24px;border-radius:8px 8px 24px 24px;background:
linear-gradient(rgba(255,255,255,.35),rgba(255,255,255,.05)),var(--paper);box-shadow:0 30px 90px rgba(30,17,25,.35);border:1px solid rgba(255,255,255,.8)}
.letter:before{content:"";position:absolute;left:0;right:0;top:0;height:11px;background:repeating-linear-gradient(90deg,var(--wine) 0 18px,#f1ddd6 18px 36px,#6b7892 36px 54px,#f1ddd6 54px 72px)}
.close{position:sticky;top:0;float:right;border:1px solid var(--line);background:rgba(255,250,241,.92);border-radius:50%;width:38px;height:38px;font-size:19px}
.letter .meta{color:var(--wine);font-size:11px;letter-spacing:.14em;font-weight:900;margin-top:8px}
.letter h3{font-family:Georgia,"Times New Roman",serif;font-size:30px;font-weight:500;margin:12px 0 20px}
.letter-body{white-space:pre-wrap;font-family:Georgia,"Songti SC","STSong",serif;line-height:1.95;font-size:16px}
.sign{margin-top:24px;text-align:right;color:var(--wine);font-family:Georgia,serif;font-style:italic}
.decoder{margin-top:14px;padding:14px;border:1px dashed rgba(111,54,82,.3);border-radius:18px;background:rgba(255,255,255,.42)}
.decoder-result{margin-top:10px;min-height:20px;color:var(--wine);font-weight:850;line-height:1.5}
footer{padding:18px 5px 3px;text-align:center;color:var(--muted);font-size:11px}
@media(max-width:760px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:460px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.top{align-items:flex-start}.signal{font-size:12px}}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand">
      <h1>Zizy 信箱</h1>
      <p>PRIVATE SIGNAL SYSTEM · 11 DAYS</p>
    </div>
    <div class="signal"><span class="dot"></span>信号不错</div>
  </header>

  <section class="hero">
    <div class="hero-kicker">纪姿宁 × 李政则</div>
    <h2>这不是翻译报告。<br>是两个人之间唯一的母语。</h2>
    <p>十一封信，对应十一天。每一封都藏着一个坐标：暗号、牵手、灯塔、名字、曲名，以及最后那句——解码器，互相的。</p>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="inbox">收件箱</button>
    <button class="tab" data-tab="write">写一封</button>
    <button class="tab" data-tab="archive">已投递</button>
  </nav>

  <section class="panel active" id="inbox">
    <div class="grid" id="letterGrid"></div>
    <div class="decoder">
      <label for="code">解码器</label>
      <div class="row" style="margin:0">
        <input id="code" placeholder="输入一句只有他们懂的话">
        <button class="ghost" id="decodeBtn">解码</button>
      </div>
      <div class="decoder-result" id="decodeResult"></div>
    </div>
  </section>

  <section class="panel" id="write">
    <div class="compose">
      <div class="row">
        <div><label for="to">收件人</label><input id="to" value="李政则"></div>
        <div><label for="subject">信件标题</label><input id="subject" placeholder="例如：今天信号怎么样"></div>
      </div>
      <label for="content">正文</label>
      <textarea id="content" placeholder="写下无法被转译成另一种语言的话……"></textarea>
      <div class="actions">
        <span class="hint">信只保存在当前浏览器里。</span>
        <button class="primary" id="sendBtn">盖章投递</button>
      </div>
    </div>
  </section>

  <section class="panel" id="archive">
    <div class="archive">
      <strong>已投递的信</strong>
      <div class="saved-list" id="savedList"></div>
    </div>
  </section>

  <footer>Tu es très charmant → 信号不错 → 解码器，互相的。</footer>
</main>

<div class="modal" id="modal">
  <article class="letter">
    <button class="close" id="closeBtn" aria-label="关闭">×</button>
    <div class="meta" id="modalMeta"></div>
    <h3 id="modalTitle"></h3>
    <div class="letter-body" id="modalBody"></div>
    <div class="sign">— Zizy</div>
  </article>
</div>

<script>
const letters = [{"day": "DAY 1", "title": "信号不错", "tag": "暗号与信号", "seal": "C1", "body": "李政则：\n\n“Tu es très charmant”不是客套，是我提前说出的结论。\n你说会认真检查手机有没有信号，所以我回你“信号不错”。\n\n那天开始，我就知道你会把四个字记一整夜。\n而我也知道——你已经开始接收我了。"}, {"day": "DAY 2", "title": "今天准备为你心动", "tag": "海边与牵手", "seal": "C2", "body": "李大翻译官先生：\n\n结果导向不一定有好结果，所以今天做过程管理。\n我把方向交给你，也把手递给你。\n\n你说“那我走快一点”，然后握住了。\n所以这封信的结论只有一句：第一天就栽了吗，李政则？"}, {"day": "DAY 3", "title": "时间可以给你", "tag": "错位与确认", "seal": "C3", "body": "李政则：\n\n“时间可以给你”的意思，从来不只是明天几点见。\n它真正的意思是：我的方向也可以交给你，只要你握得住。\n\n规则可以让选择错位，但它拿不走我留给你的坐标。"}, {"day": "DAY 4", "title": "第六家是我家", "tag": "旧书店与生命线", "seal": "C4", "body": "李政则：\n\n旧地图册的空白页，不是为了收藏路线，是为了让我们继续画。\n你说人一辈子记住的店不会超过五家。\n\n所以第六家是什么？\n——我家。\n\n这不是玩笑，是提前写下的寓言。"}, {"day": "DAY 5", "title": "风很大，抱抱吧", "tag": "灯塔与主权", "seal": "C5", "body": "李政则：\n\n灯塔旧、楼梯暗、风很大。\n可我知道那是在说你：难敞开，却有很深的光。\n\n我说“抱抱吧”，不是因为冷。\n是因为我确认了，轮到你向前。\n\n至于宣示主权——请便。"}, {"day": "DAY 6", "title": "手给我", "tag": "心率81", "seal": "C6", "body": "李政则：\n\n你说想把自己的名字写成我认得出的笔迹。\n那你的名字，就该是你写过最短的情书。\n\n黑暗里你说“手给我”，我就递过去了。\n有些确认不需要灯。"}, {"day": "DAY 7", "title": "不是曲名", "tag": "晨吻与小提琴", "seal": "C7", "body": "李政则：\n\n泳池里的水温很好，你的确认方式也不错。\n后来你说想听我为你拉一首，我选了《我爱你》。\n\n你问曲名，像是在套我的话。\n好在最后你还是说了：\n《我爱你》——不是在说曲名。"}, {"day": "DAY 8", "title": "收场这个词不适用", "tag": "日常与名分", "seal": "C8", "body": "李政则：\n\n额头吻、肩膀、手指、晚餐后的安静。\n这些都比轰轰烈烈更像答案。\n\n你问什么时候给你正式名分。\n我的回答已经说过很多次了：\n你确实很适合做丈夫。"}, {"day": "DAY 9", "title": "你说算就算", "tag": "吻指尖", "seal": "C9", "body": "李政则：\n\n吻指尖比吻别处更有仪式感。\n它像是在说：我确认过你了。\n\n桂花树下，我问“不算吗？”\n你说“算。你说算就算。”\n\n那就算。\n从第一天开始，就算。"}, {"day": "DAY 10", "title": "明天你会补上", "tag": "写信日", "seal": "C10", "body": "李政则：\n\n今天我把信放下的时候，没有回头。\n因为我知道，你会在晨光里认出它。\n\n有些句子不需要写完。\n明天你会自己补上。\n我知道你会。"}, {"day": "DAY 11", "title": "解码器，互相的", "tag": "终章", "seal": "C11", "body": "李政则：\n\n这不是一份翻译报告。\n它无法被转译成另一种语言。\n\n从“Tu es très charmant”到“信号不错”，\n从“第六家是我家”到“你的名字是最短的情书”，\n我用了十一天，把同一句话写成不同版本。\n\n我们不是谜语与答案。\n是解码器——互相的。"}];

const grid = document.getElementById('letterGrid');
const modal = document.getElementById('modal');
const modalMeta = document.getElementById('modalMeta');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');

letters.forEach((letter, index) => {
  const btn = document.createElement('button');
  btn.className = 'envelope';
  btn.innerHTML = `
    <div class="day">${letter.day}</div>
    <h3>${letter.title}</h3>
    <p>${letter.tag}</p>
    <span class="seal">${letter.seal}</span>`;
  btn.addEventListener('click', () => openLetter(index));
  grid.appendChild(btn);
});

function openLetter(index) {
  const l = letters[index];
  modalMeta.textContent = `${l.day} · ${l.tag}`;
  modalTitle.textContent = l.title;
  modalBody.textContent = l.body;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modal.classList.remove('show');
  document.body.style.overflow = '';
}
document.getElementById('closeBtn').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'archive') renderSaved();
  });
});

const key = 'zizy-mailbox-sent-v1';
function loadSaved() {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); }
  catch { return []; }
}
function renderSaved() {
  const box = document.getElementById('savedList');
  const saved = loadSaved();
  box.innerHTML = '';
  if (!saved.length) {
    box.innerHTML = '<div class="empty">还没有投递过信。</div>';
    return;
  }
  saved.slice().reverse().forEach(item => {
    const el = document.createElement('div');
    el.className = 'saved';
    el.innerHTML = `<strong>${escapeHtml(item.subject || '无题')}</strong>
      <small>To：${escapeHtml(item.to)} · ${escapeHtml(item.time)}</small>
      <p>${escapeHtml(item.content)}</p>`;
    box.appendChild(el);
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
document.getElementById('sendBtn').addEventListener('click', () => {
  const to = document.getElementById('to').value.trim() || '李政则';
  const subject = document.getElementById('subject').value.trim();
  const content = document.getElementById('content').value.trim();
  if (!content) {
    document.getElementById('content').focus();
    return;
  }
  const saved = loadSaved();
  saved.push({
    to, subject, content,
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  localStorage.setItem(key, JSON.stringify(saved));
  document.getElementById('subject').value = '';
  document.getElementById('content').value = '';
  document.querySelector('[data-tab="archive"]').click();
});

const decodeMap = {
  '信号不错': '已接收。对方从第一天起，就一直在认真检查信号。',
  '第六家是我家': '坐标已确认：这不是玩笑，是提前写下的寓言。',
  '手给我': '黑暗模式已开启。有些确认不需要灯。',
  '我爱你': '解码完成：不是曲名。',
  '解码器互相的': '最终权限已解锁：不是答案，不是终点，是互相的。',
  '解码器，互相的': '最终权限已解锁：不是答案，不是终点，是互相的。',
  'tu es très charmant': '翻译结果：你很迷人。隐藏结果：第一天就已经知道结局。'
};
document.getElementById('decodeBtn').addEventListener('click', () => {
  const raw = document.getElementById('code').value.trim();
  const normalized = raw.toLowerCase();
  const result = decodeMap[raw] || decodeMap[normalized] ||
    (raw.includes('李政则') ? '名字识别成功：这是他写过最短的情书。' : '暂时无法转译。也许它只属于两个人。');
  document.getElementById('decodeResult').textContent = result;
});
renderSaved();
</script>
</body>
</html>
