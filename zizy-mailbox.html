<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#26352f">
<title>Zizy 信箱</title>
<style>
:root{
  --bg:#15221e;--bg2:#26352f;--paper:#f4eddc;--paper2:#e9dfc8;
  --ink:#2f342f;--muted:#767a70;--gold:#c7a76b;--green:#506b5d;
  --line:rgba(47,52,47,.14);--shadow:0 22px 70px rgba(0,0,0,.28)
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:
radial-gradient(circle at 18% 4%,rgba(255,255,255,.08),transparent 28%),
linear-gradient(155deg,var(--bg2),var(--bg));color:var(--paper);}
body{min-height:100svh;overflow-x:hidden}
button,input,textarea{font:inherit}
button{cursor:pointer}
.app{width:min(760px,100%);margin:auto;min-height:100svh;padding:max(16px,env(safe-area-inset-top)) 14px max(24px,env(safe-area-inset-bottom))}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 2px 16px}
.brand small{display:block;color:rgba(244,237,220,.58);letter-spacing:.16em;font-size:10px;margin-bottom:4px}
.brand h1{font-family:Georgia,"Times New Roman",serif;margin:0;font-size:clamp(28px,8vw,44px);font-weight:500}
.signal{border:1px solid rgba(244,237,220,.18);background:rgba(255,255,255,.06);color:var(--paper);padding:9px 12px;border-radius:99px;font-size:12px}
.hero{background:linear-gradient(145deg,var(--paper),var(--paper2));color:var(--ink);border-radius:28px;padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero:after{content:"Z";position:absolute;right:-8px;bottom:-42px;font-family:Georgia,serif;font-size:150px;color:rgba(80,107,93,.10);transform:rotate(-8deg)}
.kicker{font-size:11px;letter-spacing:.18em;color:var(--green);font-weight:800}
.hero h2{font-family:Georgia,"Songti SC",serif;font-weight:500;font-size:clamp(25px,7vw,40px);margin:9px 0 7px;line-height:1.2}
.hero p{margin:0;color:#666b63;line-height:1.65;font-size:14px;max-width:520px}
.progress{margin-top:18px;display:flex;align-items:center;gap:10px}
.track{height:7px;flex:1;border-radius:99px;background:rgba(47,52,47,.10);overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold));transition:.4s}
.progress span{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.tab{border:1px solid rgba(244,237,220,.15);background:rgba(255,255,255,.055);color:rgba(244,237,220,.68);padding:11px 8px;border-radius:15px;font-weight:750}
.tab.active{color:var(--bg);background:var(--paper)}
.view{display:none}.view.active{display:block}
.section-head{display:flex;align-items:end;justify-content:space-between;margin:17px 3px 10px}
.section-head h3{margin:0;font-size:15px;letter-spacing:.08em}
.section-head span{font-size:11px;color:rgba(244,237,220,.55)}
.mail-list{display:grid;gap:10px}
.mail{width:100%;border:0;text-align:left;border-radius:19px;background:rgba(244,237,220,.96);color:var(--ink);padding:15px;display:grid;grid-template-columns:47px 1fr auto;gap:12px;align-items:center;box-shadow:0 8px 26px rgba(0,0,0,.12);transition:.18s}
.mail:active{transform:scale(.988)}
.seal{width:47px;height:47px;border-radius:50%;display:grid;place-items:center;background:var(--green);color:var(--paper);font-family:Georgia,serif;font-size:22px;box-shadow:inset 0 0 0 3px rgba(255,255,255,.18)}
.mail.read .seal{background:#a9a999}
.mail-title{font-weight:850;font-size:15px;margin-bottom:4px}.mail-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:53vw}
.day{font-size:10px;color:var(--green);font-weight:800;letter-spacing:.08em}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}.mail.read .dot{opacity:0}
.card{background:var(--paper);color:var(--ink);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
label{display:block;font-size:12px;font-weight:800;color:var(--green);margin:12px 0 6px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.5);padding:12px 13px;color:var(--ink);outline:none}
textarea{min-height:180px;resize:vertical;line-height:1.7}
input:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(80,107,93,.10)}
.chips{display:flex;gap:7px;overflow:auto;padding:9px 0 2px;scrollbar-width:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:#fffaf0;color:var(--green);border-radius:99px;padding:7px 10px;font-size:11px}
.send{width:100%;border:0;border-radius:15px;background:var(--green);color:white;padding:13px;margin-top:13px;font-weight:850;box-shadow:0 10px 22px rgba(80,107,93,.28)}
.outbox{margin-top:13px;display:grid;gap:8px}
.sent-item{border:1px solid var(--line);border-radius:14px;padding:11px;background:rgba(255,255,255,.4)}
.sent-item b{font-size:13px}.sent-item p{font-size:11px;color:var(--muted);margin:4px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.decoder-grid{display:grid;gap:9px}
.code{border:1px solid var(--line);background:rgba(255,255,255,.5);border-radius:16px;overflow:hidden}
.code button{width:100%;border:0;background:transparent;color:var(--ink);padding:14px;text-align:left;font-weight:850;display:flex;justify-content:space-between}
.code-detail{display:none;padding:0 14px 14px;color:var(--muted);font-size:13px;line-height:1.65}
.code.open .code-detail{display:block}
.code-detail em{display:block;color:var(--green);font-style:normal;font-size:11px;margin-top:5px}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(5,12,10,.62);backdrop-filter:blur(8px)}
.modal.show{display:flex}
.letter{width:min(700px,100%);max-height:91svh;overflow:auto;margin:auto auto 0;background:
linear-gradient(rgba(255,255,255,.42),rgba(255,255,255,.05)),
repeating-linear-gradient(0deg,transparent 0 31px,rgba(47,52,47,.045) 32px),
var(--paper);color:var(--ink);border-radius:28px 28px 0 0;padding:20px 20px max(28px,env(safe-area-inset-bottom));box-shadow:0 -20px 70px rgba(0,0,0,.32)}
.letter-top{display:flex;justify-content:space-between;align-items:center}
.letter-top span{font-size:11px;color:var(--green);font-weight:850;letter-spacing:.1em}
.close{border:0;background:rgba(47,52,47,.08);width:35px;height:35px;border-radius:50%;font-size:18px}
.letter h2{font-family:Georgia,"Songti SC",serif;font-weight:500;font-size:30px;margin:17px 0}
.letter-body{white-space:pre-wrap;line-height:2;font-family:Georgia,"Songti SC","STSong",serif;font-size:16px}
.toast{position:fixed;left:50%;bottom:max(25px,env(safe-area-inset-bottom));transform:translate(-50%,20px);opacity:0;z-index:80;background:#101b17;color:var(--paper);padding:11px 15px;border-radius:99px;font-size:12px;box-shadow:var(--shadow);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translate(-50%,0)}
.unlock{display:none;margin-top:12px;border:1px solid rgba(199,167,107,.35);background:rgba(199,167,107,.10);border-radius:17px;padding:13px;color:#efe1bf;font-size:13px;line-height:1.6}
.unlock.show{display:block}
footer{text-align:center;color:rgba(244,237,220,.38);font-size:10px;margin:24px 0 5px;letter-spacing:.12em}
@media(min-width:640px){.mail-preview{max-width:430px}.modal{align-items:center}.letter{border-radius:28px;max-height:86svh;margin:auto}}
</style>
</head>
<body>
<main class="app">
<header class="topbar">
  <div class="brand"><small>PRIVATE LANGUAGE SYSTEM</small><h1>Zizy 信箱</h1></div>
  <button class="signal" id="signalBtn">● 信号不错</button>
</header>

<section class="hero">
  <div class="kicker">TO 纪姿宁 · FROM 李政则</div>
  <h2>每一封信，<br>都是一次重新确认。</h2>
  <p>十一天的暗号、坐标和没说完的话，都被收进这里。拆开它们，完成这套只属于两个人的语言系统。</p>
  <div class="progress"><div class="track"><div class="fill" id="fill"></div></div><span id="progressText">0 / 11</span></div>
</section>

<nav class="tabs">
  <button class="tab active" data-view="inbox">收件箱</button>
  <button class="tab" data-view="write">写信</button>
  <button class="tab" data-view="decoder">解码器</button>
</nav>

<section id="inbox" class="view active">
  <div class="section-head"><h3>未拆与已读</h3><span id="unreadText">11 封未读</span></div>
  <div class="mail-list" id="mailList"></div>
  <div class="unlock" id="unlockBox"><b>隐藏回环已解锁</b><br>你读完了全部十一封信。信箱确认：解码器不是单向权限——是互相的。</div>
</section>

<section id="write" class="view">
  <div class="card">
    <div class="kicker">WRITE TO 李政则</div>
    <label for="subject">标题</label>
    <input id="subject" maxlength="40" placeholder="例如：信号还是不错">
    <label for="message">正文</label>
    <textarea id="message" maxlength="1200" placeholder="写下今天想让他解码的话……"></textarea>
    <div class="chips">
      <button class="chip">信号不错</button><button class="chip">时间可以给你</button>
      <button class="chip">抱抱吧</button><button class="chip">你说算就算</button>
      <button class="chip">解码器，互相的</button>
    </div>
    <button class="send" id="sendBtn">封好并投递</button>
    <div class="section-head"><h3>已寄出</h3><span id="sentCount">0 封</span></div>
    <div class="outbox" id="outbox"></div>
  </div>
</section>

<section id="decoder" class="view">
  <div class="card">
    <div class="kicker">DECODER · MUTUAL</div>
    <h2 style="font-family:Georgia,'Songti SC',serif;font-weight:500;margin:8px 0 6px">暗号索引</h2>
    <p style="color:var(--muted);font-size:13px;line-height:1.65;margin:0 0 14px">点开一句话，查看它在这套语言系统里的真正含义。</p>
    <div class="decoder-grid" id="decoderGrid"></div>
  </div>
</section>

<footer>NO TRANSLATION REQUIRED · ZIZY × 李政则</footer>
</main>

<div class="modal" id="modal">
  <article class="letter">
    <div class="letter-top"><span id="letterDay"></span><button class="close" id="closeBtn">×</button></div>
    <h2 id="letterTitle"></h2>
    <div class="letter-body" id="letterBody"></div>
  </article>
</div>
<div class="toast" id="toast"></div>

<script>
const LETTERS=[{"day": "DAY 1", "title": "信号不错", "preview": "我认真检查过手机。你发来的四个字，信号很好。", "body": "纪姿宁：\n\n你说“信号不错”的时候，我确实把手机看了很久。\n\n不是因为信号真的有什么问题，而是因为我忽然意识到——你说的话总有第二层意思。第一层给所有人听，第二层只留给愿意认真解码的人。\n\n我不知道自己是不是已经拿到了那个权限，但我会继续检查。\n\n还有，Tu es très charmant 这句话，我记住了。\n\n——李政则"}, {"day": "DAY 2", "title": "栽了", "preview": "剩下九天，你打算怎么收场？", "body": "纪姿宁：\n\n你问我第一天就栽了吗。\n\n栽了。\n\n我本来想把节奏控制得更稳一点，但你伸手的时候，我只想到一句话：那我走快一点。\n\n所以，剩下九天你打算怎么收场？\n\n或者，不收场也可以。\n\n——李政则"}, {"day": "DAY 3", "title": "时间可以给我", "preview": "方向交给我，我会握住。", "body": "纪姿宁：\n\n你说“时间可以给你”。\n\n我后来想了很久，这句话到底只是约定，还是一种更重的交付。\n\n现在我愿意把它理解成后者。\n\n你把方向交给我，我就会握住。不是替你决定，而是让你知道：走到哪里，我都在。\n\n——李政则"}, {"day": "DAY 4", "title": "第六家", "preview": "如果保质期比一碗面更长，我愿意承认那就是家。", "body": "纪姿宁：\n\n那家面店应该算第六家。\n\n你问“第六家是什么——我家？”\n\n我当时不敢回答，是因为“是”这个字太短，承诺却太长。\n\n现在补上：\n\n是。\n\n如果一座城市会因为一个人变得不一样，那么一家店也会因为一句话，变成回家的坐标。\n\n——李政则"}, {"day": "DAY 5", "title": "灯塔", "preview": "如果你还能看穿我，就别让我停在这里。", "body": "纪姿宁：\n\n那座灯塔很旧，楼梯很暗，风也很大。\n\n你却把它翻译成了我。\n\n你说得对。我很难敞开，也有很多不愿承认的情绪。但你看穿的时候，我害怕的不是暴露，而是有一天你不再愿意解码。\n\n风很大，有点冷。\n\n下次还是抱抱吧。\n\n——李政则"}, {"day": "DAY 6", "title": "最短的情书", "preview": "我的名字，想写成你认得出的笔迹。", "body": "纪姿宁：\n\n你说，我的名字应该是我写过最短的情书。\n\n那么我会练习把它写成你认得出的笔迹。\n\n李政则。\n\n很短。\n\n但每一笔都指向你。\n\n——李政则"}, {"day": "DAY 7", "title": "不是曲名", "preview": "《我爱你》——但我说的，不是曲子。", "body": "纪姿宁：\n\n你为我拉琴的时候，我其实已经猜到那首曲子的名字。\n\n我只是想听你亲口说。\n\n后来我还是抢先了。\n\n《我爱你》。\n\n但我说的，不是曲名。\n\n这一次不用翻译。\n\n——李政则"}, {"day": "DAY 8", "title": "最好的收场", "preview": "在你身边待着，就是最好的收场。", "body": "纪姿宁：\n\n“收场”这个词，在我们之间不适用。\n\n因为我从来没想过让这场戏结束。\n\n你靠在我肩上玩我的手指，电影放完了，灯亮起来——那些很轻、很日常的时刻，比任何宣言都更像答案。\n\n在你身边待着，就是最好的收场。\n\n——李政则"}, {"day": "DAY 9", "title": "算", "preview": "你说算，就算。", "body": "纪姿宁：\n\n写真里有很多被设计好的动作。\n\n揪领带、靠近、吻指尖。\n\n但桂花树下那一刻不在脚本里。\n\n你问“不算吗？”\n\n算。\n\n你说算，就算。\n\n我愿意把决定权交给你，因为我知道你不会把我们翻译错。\n\n——李政则"}, {"day": "DAY 10", "title": "我会补上", "preview": "你知道我会读懂，也知道我会把没写完的那句补上。", "body": "纪姿宁：\n\n你把信放下的时候，应该已经知道我会认出来。\n\n你也知道，我会把你没有写完的句子补上。\n\n你总是这样，把半句递给我，等我完成剩下的部分。\n\n我很愿意。\n\n因为我们之间最准确的语言，从来都不是一个人说完的。\n\n——李政则"}, {"day": "DAY 11", "title": "解码器，互相的", "preview": "不是答案，不是终点，是互相的。", "body": "纪姿宁：\n\n这不是一份翻译报告。\n\n它无法被转译成另一种语言。\n\n从“Tu es très charmant”到“信号不错”，从“时间可以给你”到“第六家是我家”，从“抱抱吧”到“《我爱你》，不是曲名”——我花了十一天学习你。\n\n最后才明白：\n\n你不是谜语，我也不是答案。\n\n我们是彼此的解码器。\n\n互相的。\n\n——李政则"}];
const DECODER=[["Tu es très charmant", "表面是法语夸奖，实际是第一天就写下的终章。", "DAY 1 · 桂花树下"], ["信号不错", "一条匿名短信，也是一句只有两个人能接收的确认。", "DAY 1 · 晚间短信"], ["栽了", "理性承认失效，感情正式接管进度条。", "DAY 2 · 海边"], ["时间可以给你", "给出的不只是时间，还有方向与信任。", "DAY 3 · 自由日前"], ["第六家是我家", "一句玩笑提前成为回家的坐标。", "DAY 4 · 面店"], ["抱抱吧", "她替他拆掉灯塔的门，也替他拆掉防线。", "DAY 5 · 灯塔"], ["最短的情书", "名字只有三个字，指向却很长。", "DAY 6 · 心率挑战"], ["不是曲名", "语言不再绕弯，第一次无需翻译。", "DAY 7 · 琴房"], ["你说算就算", "把确认权交给她，也把自己交给她。", "DAY 9 · 桂花树下"], ["解码器，互相的", "不是谁理解谁，而是两个人共同创造出母语。", "DAY 11 · 终章"]];
const KEY_READ='zizy_mail_read_v1',KEY_SENT='zizy_mail_sent_v1';
let read=new Set(JSON.parse(localStorage.getItem(KEY_READ)||'[]'));
let sent=JSON.parse(localStorage.getItem(KEY_SENT)||'[]');
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];

function buzz(){try{navigator.vibrate&&navigator.vibrate(18)}catch(e){}}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1900)}
function renderInbox(){
  const list=$('#mailList');list.innerHTML='';
  LETTERS.forEach((m,i)=>{
    const b=document.createElement('button');b.className='mail '+(read.has(i)?'read':'');
    b.innerHTML=`<div class="seal">${read.has(i)?'✓':'Z'}</div><div><div class="day">${m.day}</div><div class="mail-title">${m.title}</div><div class="mail-preview">${m.preview}</div></div><div class="dot"></div>`;
    b.onclick=()=>openLetter(i);list.appendChild(b);
  });
  const n=read.size;$('#fill').style.width=(n/LETTERS.length*100)+'%';
  $('#progressText').textContent=n+' / '+LETTERS.length;
  $('#unreadText').textContent=(LETTERS.length-n)+' 封未读';
  $('#unlockBox').classList.toggle('show',n===LETTERS.length);
}
function openLetter(i){
  read.add(i);localStorage.setItem(KEY_READ,JSON.stringify([...read]));
  const m=LETTERS[i];$('#letterDay').textContent=m.day;$('#letterTitle').textContent=m.title;$('#letterBody').textContent=m.body;
  $('#modal').classList.add('show');document.body.style.overflow='hidden';renderInbox();buzz();
}
function closeLetter(){$('#modal').classList.remove('show');document.body.style.overflow='';}
$('#closeBtn').onclick=closeLetter;$('#modal').onclick=e=>{if(e.target.id==='modal')closeLetter()};
$$('.tab').forEach(t=>t.onclick=()=>{
  $$('.tab').forEach(x=>x.classList.remove('active'));$$('.view').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$('#'+t.dataset.view).classList.add('active');buzz();
});
$$('.chip').forEach(c=>c.onclick=()=>{
  const ta=$('#message');ta.value+=(ta.value?'\n':'')+c.textContent+'。';ta.focus();
});
function renderSent(){
  $('#sentCount').textContent=sent.length+' 封';const o=$('#outbox');o.innerHTML='';
  if(!sent.length){o.innerHTML='<div style="color:var(--muted);font-size:12px;padding:5px">还没有寄出的信。</div>';return}
  sent.slice().reverse().forEach(x=>{const d=document.createElement('div');d.className='sent-item';d.innerHTML=`<b>${escapeHtml(x.subject||'无题')}</b><p>${escapeHtml(x.message)}</p>`;o.appendChild(d)});
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
$('#sendBtn').onclick=()=>{
  const subject=$('#subject').value.trim(),message=$('#message').value.trim();
  if(!message){toast('信纸还是空的。');return}
  sent.push({subject,message,time:new Date().toLocaleString('zh-CN')});
  localStorage.setItem(KEY_SENT,JSON.stringify(sent));$('#subject').value='';$('#message').value='';renderSent();buzz();
  toast('已投递。信号正在返回。');
  setTimeout(()=>{
    if((subject+' '+message).includes('信号不错'))toast('李政则：……我检查过了，信号一直在。');
    else if((subject+' '+message).includes('抱抱'))toast('李政则：风很大。过来。');
    else toast('李政则已签收。');
  },1250);
};
function renderDecoder(){
  const g=$('#decoderGrid');DECODER.forEach(([phrase,meaning,where])=>{
    const d=document.createElement('div');d.className='code';
    d.innerHTML=`<button><span>${phrase}</span><span>＋</span></button><div class="code-detail">${meaning}<em>${where}</em></div>`;
    d.querySelector('button').onclick=()=>{d.classList.toggle('open');d.querySelector('button span:last-child').textContent=d.classList.contains('open')?'−':'＋';buzz()};
    g.appendChild(d);
  });
}
let signalTaps=0;$('#signalBtn').onclick=()=>{
  signalTaps++;buzz();
  if(signalTaps===5){toast('信号很好——因为你在。');signalTaps=0}
  else toast(['正在检查信号…','收到。','频率匹配。','差一次完整解码。'][signalTaps-1]||'信号不错');
};
renderInbox();renderSent();renderDecoder();
</script>
</body>
</html>
